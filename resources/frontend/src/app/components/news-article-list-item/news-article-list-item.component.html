<div class="news-article-list-item" data-testid="news-article-list-item">
  <div class="news-article-title-container">
    <div class="news-article-with-chip">
      <h2 data-testid="news-article-title">
        <a routerLink="/hirek/{{ id() }}" class="no-link">{{ title() }}</a>
      </h2>
      @if (isRead() === false) {
        <mat-chip>Új</mat-chip>
      }
    </div>
    <h4 data-testid="news-article-updated-at">{{ displayUpdatedAt() }}</h4>
  </div>
  <div
    data-testid="news-article-main-content"
    [innerHTML]="mainContentHtml()"
  ></div>
  @if (additionalContent()) {
    <div
      data-testid="news-article-additional-content"
      class="news-article-additional-content"
    >
      <a routerLink="/hirek/{{ id() }}" class="zephyr-link">Tovább...</a>
    </div>
  }
</div>
